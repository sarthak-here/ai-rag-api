services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - rag_data:/app/data
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/rag.db
      - CHROMA_PERSIST_DIR=/app/data/chroma
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  rag_data:
